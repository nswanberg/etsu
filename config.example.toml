# Example configuration for etsu

[database]
# Your postgres database url, if empty only local sqlite db will be used
# Example:
# postgres_url = "postgresql://user:password@host:port/postgres"
postgres_url = ""

[identity]
# Stable per-device identifier and display name.
# Leave these commented out to have ETSU generate/persist a UUID and use the
# Mac ComputerName on first launch.
# device_id = "device-your-machine"
# device_name = "Your Mac"

# Log level filter (e.g., "info", "warn")
log_level = "info"

[intervals_ms]
# How often to calculate distance from latest mouse position (ms)
processing = 250
# How often to save metrics to the database (ms)
saving = 60000 # 60 seconds
# How often to update the system tray UI (ms)
ui_update = 5000 # 5 seconds
